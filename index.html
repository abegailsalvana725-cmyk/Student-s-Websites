<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0d47a1, #42a5f5);
}

.container{
    width:420px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

h2{
    color:#0d47a1;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#0d47a1;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

.hidden{
    display:none;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0d47a1;
    margin:10px auto;
}

.info{
    text-align:left;
    margin-top:15px;
}

.info p{
    margin:8px 0;
}

/* PASSWORD BOX */
.pass-box{
    position:relative;
}

/* SHOW/HIDE BUTTON */
.eye{
    position:absolute;
    right:12px;
    top:12px;
    cursor:pointer;
    font-size:12px;
    color:#0d47a1;
    font-weight:bold;
    transition:0.2s;
}

/* BLINK EFFECT */
.blink{
    animation: blinkAnim 0.25s linear;
}

@keyframes blinkAnim{
    0%{opacity:1;}
    50%{opacity:0.2;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<!-- REGISTER -->
<div class="container" id="registerSection">
    <img src="jrmsu logo.PNG" class="logo">

    <h2>Student Registration</h2>

    <input type="text" id="fullname" placeholder="Full Name">
    <input type="text" id="course" placeholder="Course">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="birthdate" placeholder="Birthdate">
    <input type="email" id="email" placeholder="Email Address">
    <input type="text" id="username" placeholder="Create Username">

    <div class="pass-box">
        <input type="password" id="password" placeholder="Create Password">
        <span class="eye" id="regEye" onclick="toggleRegisterPass()">SHOW</span>
    </div>

    <input type="file" id="photo">

    <button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="container hidden" id="loginSection">
    <img src="jrmsu logo.PNG" class="logo">

    <h2>Login</h2>

    <input type="text" id="loginUser" placeholder="Username">

    <div class="pass-box">
        <input type="password" id="loginPass" placeholder="Password">
        <span class="eye" id="loginEye" onclick="toggleLoginPass()">SHOW</span>
    </div>

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardSection">
    <img src="jrmsu logo.PNG" class="logo">

    <h2>Student Dashboard</h2>

    <img id="displayPhoto" class="profile-img">

    <div class="info">
        <p><strong>Full Name:</strong> <span id="showName"></span></p>
        <p><strong>Course:</strong> <span id="showCourse"></span></p>
        <p><strong>Age:</strong> <span id="showAge"></span></p>
        <p><strong>Birthdate:</strong> <span id="showBirthdate"></span></p>
        <p><strong>Email:</strong> <span id="showEmail"></span></p>
        <p><strong>Username:</strong> <span id="showUsername"></span></p>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script>

let registeredUser = {};

function register() {
    let file = document.getElementById("photo").files[0];

    if (!file) {
        alert("Please upload your photo.");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e) {

        registeredUser = {
            fullname: document.getElementById("fullname").value,
            course: document.getElementById("course").value,
            age: document.getElementById("age").value,
            birthdate: document.getElementById("birthdate").value,
            email: document.getElementById("email").value,
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
            photo: e.target.result
        };

        alert("Registration Successful! Please login.");

        document.getElementById("registerSection").classList.add("hidden");
        document.getElementById("loginSection").classList.remove("hidden");
    };

    reader.readAsDataURL(file);
}

function login() {

    let username = document.getElementById("loginUser").value;
    let password = document.getElementById("loginPass").value;

    if(username === registeredUser.username && password === registeredUser.password){

        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("dashboardSection").classList.remove("hidden");

        document.getElementById("showName").innerText = registeredUser.fullname;
        document.getElementById("showCourse").innerText = registeredUser.course;
        document.getElementById("showAge").innerText = registeredUser.age;
        document.getElementById("showBirthdate").innerText = registeredUser.birthdate;
        document.getElementById("showEmail").innerText = registeredUser.email;
        document.getElementById("showUsername").innerText = registeredUser.username;
        document.getElementById("displayPhoto").src = registeredUser.photo;

    } else {
        alert("Invalid Login Credentials!");
    }
}

function logout(){
    document.getElementById("dashboardSection").classList.add("hidden");
    document.getElementById("loginSection").classList.remove("hidden");
}

/* TOGGLE REGISTER PASSWORD + BLINK */
function toggleRegisterPass(){
    let pass = document.getElementById("password");
    let eye = document.getElementById("regEye");

    eye.classList.add("blink");
    setTimeout(()=> eye.classList.remove("blink"), 250);

    if(pass.type === "password"){
        pass.type = "text";
        eye.innerText = "HIDE";
    } else {
        pass.type = "password";
        eye.innerText = "SHOW";
    }
}

/* TOGGLE LOGIN PASSWORD + BLINK */
function toggleLoginPass(){
    let pass = document.getElementById("loginPass");
    let eye = document.getElementById("loginEye");

    eye.classList.add("blink");
    setTimeout(()=> eye.classList.remove("blink"), 250);

    if(pass.type === "password"){
        pass.type = "text";
        eye.innerText = "HIDE";
    } else {
        pass.type = "password";
        eye.innerText = "SHOW";
    }
}

</script>

</body>
</html>
